<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猫娘桌面助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="https://unpkg.com/splitting@1.0.6/dist/splitting.js"></script>
    <link href="https://unpkg.com/splitting@1.0.6/dist/splitting.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        
        * {
            font-family: 'Noto Sans SC', sans-serif;
        }
        
        body {
            background: transparent;
            overflow: hidden;
            user-select: none;
        }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
        }
        
        .catgirl-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            cursor: move;
        }
        
        .chat-bubble {
            position: absolute;
            bottom: 120px;
            right: 0;
            min-width: 280px;
            max-width: 350px;
            transform-origin: bottom right;
            opacity: 0;
            transform: scale(0) translateY(20px);
        }
        
        .chat-bubble.active {
            opacity: 1;
            transform: scale(1) translateY(0);
        }
        
        .typing-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ec4899;
            animation: typing 1.4s infinite ease-in-out;
        }
        
        .typing-indicator:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }
        
        .message-bubble {
            background: linear-gradient(135deg, rgba(236, 72, 153, 0.9), rgba(219, 39, 119, 0.9));
            color: white;
            padding: 12px 16px;
            border-radius: 18px;
            margin: 8px 0;
            word-wrap: break-word;
            line-height: 1.4;
            font-size: 14px;
            box-shadow: 0 4px 12px rgba(236, 72, 153, 0.3);
        }
        
        .user-message {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.9), rgba(37, 99, 235, 0.9));
            margin-left: 20px;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        
        .catgirl-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(236, 72, 153, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .catgirl-avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 40px rgba(236, 72, 153, 0.4);
        }
        
        .input-container {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            padding: 8px;
            margin-top: 8px;
            border: 1px solid rgba(236, 72, 153, 0.2);
        }
        
        .message-input {
            background: transparent;
            border: none;
            outline: none;
            width: 100%;
            resize: none;
            font-size: 14px;
            color: #374151;
            max-height: 80px;
        }
        
        .send-button {
            background: linear-gradient(135deg, #ec4899, #db2777);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
        }
        
        .send-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(236, 72, 153, 0.4);
        }
        
        .status-indicator {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #10b981;
            border: 2px solid white;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
        
        .expression-change {
            animation: bounce 0.6s ease-in-out;
        }
        
        @keyframes bounce {
            0%, 20%, 60%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            80% { transform: translateY(-5px); }
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <!-- 猫娘角色容器 -->
    <div class="catgirl-container" id="catgirlContainer">
        <div class="status-indicator" id="statusIndicator"></div>
        <img src="resources/catgirl_character.png" alt="猫娘助手" class="catgirl-avatar" id="catgirlAvatar">
        
        <!-- 聊天气泡 -->
        <div class="chat-bubble glass-effect" id="chatBubble">
            <div class="p-4">
                <div id="messageContainer">
                    <div class="message-bubble fade-in">
                        你好呀！我是你的猫娘助手～今天有什么可以帮助你的吗？
                    </div>
                </div>
                
                <div class="input-container">
                    <textarea 
                        class="message-input" 
                        id="messageInput" 
                        placeholder="输入消息..." 
                        rows="2"
                    ></textarea>
                    <div class="flex justify-between items-center mt-2">
                        <div class="flex space-x-1">
                            <div class="typing-indicator"></div>
                            <div class="typing-indicator"></div>
                            <div class="typing-indicator"></div>
                        </div>
                        <button class="send-button" id="sendButton">发送</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 控制菜单 -->
    <div class="fixed top-4 right-4 glass-effect p-3 z-50" id="controlMenu">
        <div class="flex space-x-2">
            <button class="px-3 py-1 bg-pink-500 text-white rounded-md text-sm hover:bg-pink-600 transition-colors" onclick="toggleChat()">
                💬 聊天
            </button>
            <button class="px-3 py-1 bg-blue-500 text-white rounded-md text-sm hover:bg-blue-600 transition-colors" onclick="openSettings()">
                ⚙️ 设置
            </button>
            <button class="px-3 py-1 bg-purple-500 text-white rounded-md text-sm hover:bg-purple-600 transition-colors" onclick="openModelConfig()">
                🤖 模型
            </button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
